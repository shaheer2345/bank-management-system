{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinanceHub</title>
    <link rel="stylesheet" href="{% static 'css/premium.css' %}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
            position: relative;
            overflow: auto; /* allow scrolling on small screens */
        }

        .floating-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            border-radius: 50%;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            top: -150px;
            left: -150px;
            animation: float 8s ease-in-out infinite;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            bottom: -100px;
            right: -100px;
            animation: float 10s ease-in-out infinite reverse;
        }

        .shape-3 {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            top: 50%;
            right: 10%;
            animation: float 12s ease-in-out infinite;
        }

        .login-content {
            position: relative;
            z-index: 10;
            width: 100%;
        }
    </style>
</head>
<body class="login-wrapper">
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-content">
        <div class="login-container">
            <div class="login-box">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <i class="fas fa-landmark" style="font-size: 3rem; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;"></i>
                </div>
                
                <h2>Access Your Account</h2>
                <p class="subtitle">Secure Banking at Your Fingertips</p>

                {% if error %}
                    <div class="login-error">
                        <i class="fas fa-exclamation-circle"></i> {{ error }}
                    </div>
                {% endif %}

                {% if totp %}
                    <!-- TOTP Code Entry -->
                    <form method="post" class="form-group">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="code"><i class="fas fa-lock"></i> Authentication Code</label>
                            <input type="text" id="code" name="code" placeholder="Enter 6-digit code" maxlength="6" autocomplete="off" autofocus required>
                            <small style="color: var(--text-tertiary); margin-top: 0.5rem; display: block;">Check your authenticator app</small>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                            <i class="fas fa-arrow-right"></i> Verify Code
                        </button>
                    </form>
                {% else %}
                    <!-- Email & Password Form -->
                    <form method="post" class="form-group">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="username"><i class="fas fa-envelope"></i> Email Address</label>
                            <input type="email" id="username" name="username" placeholder="your@email.com" required autofocus>
                        </div>

                        <div class="form-group">
                            <label for="password"><i class="fas fa-key"></i> Password</label>
                            <input type="password" id="password" name="password" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                            <i class="fas fa-sign-in-alt"></i> Sign In Securely
                        </button>
                    </form>
                {% endif %}

                <div class="login-box signup-link">
                    Don't have an account? <a href="/accounts/register/">Create one now</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        // Add a subtle animation to the login box
        document.querySelector('.login-box').style.animation = 'scale-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
    </script>
</body>
</html>
