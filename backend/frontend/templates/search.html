{% extends "base.html" %}

{% block title %}Transaction Search{% endblock %}

{% block content %}
<h2>Search Transactions</h2>
<form id="search-form">
    <label>Account ID <input type="number" name="account" id="account"></label><br/>
    <label>Type
        <select name="type" id="type">
            <option value="">Any</option>
            <option value="DEPOSIT">Deposit</option>
            <option value="WITHDRAW">Withdraw</option>
        </select>
    </label><br/>
    <label>From <input type="date" name="from" id="from"></label><br/>
    <label>To <input type="date" name="to" id="to"></label><br/>
    <label>Min Amount <input type="number" step="0.01" name="min_amount" id="min_amount"></label><br/>
    <label>Max Amount <input type="number" step="0.01" name="max_amount" id="max_amount"></label><br/>
    <button type="submit">Search</button>
</form>
<table id="search-results" style="margin-top:20px;">
    <thead><tr><th>Date</th><th>Account</th><th>Type</th><th>Amount</th></tr></thead>
    <tbody></tbody>
</table>
<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
document.getElementById('search-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const params = new URLSearchParams();
    ['account','type','from','to','min_amount','max_amount'].forEach(id=>{
        const val = document.getElementById(id).value;
        if(val) params.append(id,val);
    });
    fetch('/api/transactions/search/?' + params.toString())
    .then(r=>r.json())
    .then(data=>{
        const tbody = document.querySelector('#search-results tbody');
        tbody.innerHTML='';
        data.forEach(t=>{
            tbody.innerHTML += `<tr><td>${t.created_at}</td><td>${t.account}</td><td>${t.transaction_type}</td><td>${t.amount}</td></tr>`;
        });
    });
});
</script>
{% endblock %}
