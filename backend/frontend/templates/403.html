{% extends 'base.html' %}

{% block title %}403 Forbidden - Access Denied{% endblock %}

{% block content %}
<div style="text-align: center; padding: 5rem 2rem; min-height: 60vh; display: flex; align-items: center; justify-content: center;">
    <div style="animation: scale-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);">
        <div style="font-size: 4rem; margin-bottom: 1rem;">
            <i class="fas fa-lock" style="background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;"></i>
        </div>
        <h1 style="font-size: 3rem; margin-bottom: 1rem; color: var(--text-primary);">403 Access Denied</h1>
        <p style="font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 2rem; max-width: 500px;">
            You do not have permission to access this page. This action is restricted to administrators only.
        </p>
        <a href="{% url 'dashboard' %}" class="btn btn-primary" style="display: inline-block; margin-top: 1rem;">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
