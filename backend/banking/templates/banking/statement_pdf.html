<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <style>
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #333; padding: 4px; }
        th { background: #eee; }
    </style>
</head>
<body>
    <h1>Statement for {{ user.email }}</h1>
    <table>
        <thead><tr><th>Date</th><th>Account</th><th>Type</th><th>Amount</th><th>Reference</th></tr></thead>
        <tbody>
        {% for tr in transactions %}
        <tr>
            <td>{{ tr.created_at }}</td>
            <td>{{ tr.account.account_number }}</td>
            <td>{{ tr.transaction_type }}</td>
            <td>{{ tr.amount }}</td>
            <td>{{ tr.reference_id }}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</body>
</html>
